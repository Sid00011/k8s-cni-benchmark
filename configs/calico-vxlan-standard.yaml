# configs/calico-vxlan-standard.yaml
# Calico configuration with VXLAN encapsulation (standard mode)
# Author: Sidali

kind: Installation
apiVersion: operator.tigera.io/v1
metadata:
  name: default
spec:
  # Calico Cloud-Native Networking
  calicoNetwork:
    bgp: Disabled
    ipPools:
    - blockSize: 26
      cidr: 192.168.0.0/16
      encapsulation: VXLAN    # source of the overhead documented in the report
      natOutgoing: Enabled
      nodeSelector: all()
    mtu: 1480                 # reduced from 1500 to account for VXLAN header overhead
