# configs/cilium-ebpf-optimized.yaml
# Configuration used to achieve 2.28 Gbps (eBPF direct routing)
# Author: Sidali

cluster:
  name: k8s-benchmark-cluster
  id: 1

tunnel: disabled               # VXLAN disabled — eBPF direct routing mode
autoDirectNodeRoutes: true
nativeRoutingCIDR: 10.0.0.0/16
endpointRoutes:
  enabled: true

ipam:
  mode: kubernetes

operator:
  replicas: 1

# iptables bypassed entirely — all forwarding handled in eBPF kernel
